<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>WP - Worksite</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" type="text/css" media="all" href="/static/style.css" th:href="@{/style.css}" />
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
</head>
<body>
<h1>Worksite list</h1>
<div th:replace="~{fragments/navbar::navbar}"> Here is the navbar</div>

<table>
    <thead>
    <tr>
        <th>NAME</th>
        <th>INTERVENTIONS</th>
        <th>ACTIONS</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="entry : ${worksitesAndInterventions}">
        <td th:text="${entry.key.name}">VDS POLE SUD</td>
        <td>
            <div th:each="intervention : ${entry.value}"
                 th:text="${intervention.occurrence}"
            >INTERVENTION</div>
        </td>
        <td>
            <form th:action="@{/worksite/update/{id}(id=${entry.key.id})}" method="get" style="display: inline;">
                <button type="submit">Edit</button>
            </form>
            <form th:action="@{/worksite/delete/{id}(id=${entry.key.id})}" method="post" style="display: inline;" onsubmit="return confirm('Are you sure you want to delete this worksite?');">
                <button type="submit">
                    Delete
                </button>
            </form>

        </td>
    </tr>

    </tbody>
</table>


<p>
    <a href="/home.html" th:href="@{/home}">Return to home</a>
</p>

<div th:replace="~{fragments/footer::copy}">&copy; 2011 The Static Templates</div>

</body>

</html>
